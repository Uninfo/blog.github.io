<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站点装修中 - 临时测试页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f5f7fa;
            color: #333;
        }
        .main-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .tips-title {
            font-size: 32px;
            color: #222;
            margin-bottom: 20px;
        }
        .tips-text {
            font-size: 18px;
            color: #666;
            line-height: 1.8;
            text-align: center;
        }
        .loading-icon {
            font-size: 60px;
            margin-bottom: 30px;
            color: #409eff;
        }
        footer {
            padding: 30px 0;
            text-align: center;
            font-size: 14px;
            color: #888;
        }
        footer a {
            color: #409eff;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="main-box">
        <div class="loading-icon">🚧</div>
        <h1 class="tips-title">网站正在装修中</h1>
        <div class="tips-text">
            <p>当前为临时测试页面，完整站点正在加紧搭建</p>
            <p>敬请期待正式版本上线，感谢您的访问！</p>
        </div>
    </div>

    <footer>
        <a href="https://beian.miit.gov.cn/" target="_blank">豫ICP备2020025813号-4</a>
    </footer>
</body>
</html>
